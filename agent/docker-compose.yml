services:
  redis-stack:
    image: redis/redis-stack:latest
    container_name: redis-stack
    ports:
      - "6379:6379"  # Redis server port
      - "8001:8001"  # RedisInsight port
    # environment:
      # - REDIS_ARGS=--requirepass mypassword # Optional: Set a password
    volumes:
      - redis_data:/data
    restart: always

volumes:
  redis_data:

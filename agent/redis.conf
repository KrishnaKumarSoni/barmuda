# /app/redis.conf

# Network
bind 127.0.0.1
port 6379
daemonize yes
protected-mode no

# MEMORY MANAGEMENT
# INCREASED LIMIT: 1.5GB (leaving ~500MB for Python)
maxmemory 1536mb

# EVICTION POLICY
# If we hit the limit, delete the oldest keys instead of crashing
maxmemory-policy allkeys-lru

# Modules
loadmodule /opt/redis-stack/lib/redisearch.so
loadmodule /opt/redis-stack/lib/rejson.so
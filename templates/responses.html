<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#cc5500">
    <title>{{ form_title }} - Responses | Barmuda Forms</title>

    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7C7SPTNMLT"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-7C7SPTNMLT', {
            anonymize_ip: true,
            allow_google_signals: false,
            allow_ad_personalization_signals: false
        });
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-[#fef5e0] min-h-screen">
    {% set nav_type = 'responses' %}
    {% include 'partials/nav.html' %}

    <!-- Go Back -->
    <div class="max-w-6xl mx-auto pt-28 md:pt-32 px-4 flex items-center">
        <a href="/dashboard" class="flex items-center text-[#797878] cursor-pointer hover:text-[#cc5500] transition-colors">
            <i class="ph ph-caret-left text-xl mr-2"></i>
            <span class="font-['Plus_Jakarta_Sans'] font-bold text-[16px] tracking-[-0.16px]">go back</span>
        </a>
    </div>

    <!-- Page Title -->
    <div class="max-w-6xl mx-auto mt-8 px-4">
        <h1 class="font-['Plus_Jakarta_Sans'] font-bold text-[#1e1e1e] text-2xl md:text-3xl lg:text-[40px] tracking-[-0.4px]">
            collected responses
        </h1>
    </div>

    <!-- Form Title Card -->
    <div class="max-w-6xl mx-auto mt-6 px-4">
        <div class="bg-white rounded-[10px] border border-[#fbe7bd] p-4 md:p-[18px]">
            <h2 class="font-['Plus_Jakarta_Sans'] font-bold text-[#1e1e1e] text-xl md:text-2xl lg:text-[32px] tracking-[-0.32px]">
                {{ form_title }}
            </h2>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="max-w-6xl mx-auto mt-6 px-4 grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
        <div class="bg-white/80 rounded-xl border border-[#fce9c1] p-4 md:p-6 text-center backdrop-blur-sm hover:bg-white transition-colors">
            <div id="total-responses" class="font-['DM_Sans'] font-semibold text-[#1e1e1e] text-xl md:text-2xl mb-1">...</div>
            <div class="font-['DM_Sans'] font-medium text-[#5e5d5d] text-xs md:text-sm">responses</div>
        </div>
        <div class="bg-white/80 rounded-xl border border-[#fce9c1] p-4 md:p-6 text-center backdrop-blur-sm hover:bg-white transition-colors">
            <div id="completion-rate" class="font-['DM_Sans'] font-semibold text-[#1e1e1e] text-xl md:text-2xl mb-1">...</div>
            <div class="font-['DM_Sans'] font-medium text-[#5e5d5d] text-xs md:text-sm">completion rate</div>
        </div>
        <div class="bg-white/80 rounded-xl border border-[#fce9c1] p-4 md:p-6 text-center backdrop-blur-sm hover:bg-white transition-colors">
            <div id="total-messages" class="font-['DM_Sans'] font-semibold text-[#1e1e1e] text-xl md:text-2xl mb-1">...</div>
            <div class="font-['DM_Sans'] font-medium text-[#5e5d5d] text-xs md:text-sm">messages received</div>
        </div>
        <div class="bg-white/80 rounded-xl border border-[#fce9c1] p-4 md:p-6 text-center backdrop-blur-sm hover:bg-white transition-colors">
            <div id="avg-time" class="font-['DM_Sans'] font-semibold text-[#1e1e1e] text-xl md:text-2xl mb-1">...</div>
            <div class="font-['DM_Sans'] font-medium text-[#5e5d5d] text-xs md:text-sm">average chat time</div>
        </div>
    </div>

    <!-- Tab Navigation -->
    <div class="max-w-6xl mx-auto mt-6 px-4">
        <div class="bg-[#fef5e0] border border-[#fbe7bd] rounded-xl p-1.5 flex gap-1">
            <button onclick="switchTab('summary')" id="tab-summary" class="tab-btn active flex-1 bg-gradient-to-r from-[#cc5500] to-[#d12b2e] text-white rounded-lg px-2 md:px-4 py-2 md:py-3 flex items-center justify-center gap-1 md:gap-2 transition-all">
                <i class="ph ph-chart-pie-slice text-lg md:text-xl"></i>
                <span class="font-['DM_Sans'] font-medium text-xs md:text-sm">Summary</span>
            </button>
            <button onclick="switchTab('individual')" id="tab-individual" class="tab-btn flex-1 bg-transparent text-[#cc5500] rounded-lg px-2 md:px-4 py-2 md:py-3 flex items-center justify-center gap-1 md:gap-2 transition-all hover:bg-[#fff5e0]">
                <i class="ph ph-users text-lg md:text-xl"></i>
                <span class="font-['DM_Sans'] font-medium text-xs md:text-sm">Individual</span>
            </button>
        </div>
    </div>

    <!-- Export Buttons -->
    <div class="max-w-6xl mx-auto mt-6 px-4 flex flex-wrap gap-3">
        <button onclick="exportData('json')" class="bg-gradient-to-r from-[#cc5500] to-[#d12b2e] text-white px-4 md:px-6 py-2 md:py-2.5 rounded-full font-['DM_Sans'] text-xs md:text-sm font-medium hover:opacity-90 transition-opacity flex items-center gap-2">
            <i class="ph ph-export text-sm md:text-lg"></i>
            <span>Export JSON</span>
        </button>
        <button onclick="exportData('csv')" class="bg-gradient-to-r from-[#cc5500] to-[#d12b2e] text-white px-4 md:px-6 py-2 md:py-2.5 rounded-full font-['DM_Sans'] text-xs md:text-sm font-medium hover:opacity-90 transition-opacity flex items-center gap-2">
            <i class="ph ph-file-csv text-sm md:text-lg"></i>
            <span>Export CSV</span>
        </button>
    </div>

    <!-- Content Area -->
    <div class="max-w-6xl mx-auto mt-6 mb-8 px-4">
        <!-- Summary View -->
        <div id="view-summary" class="view-content space-y-8">
            <div id="questions-summary" class="space-y-8">
                <!-- Questions injected here -->
                <div class="text-center py-12 text-gray-500">Loading charts...</div>
            </div>
        </div>

        <!-- Individual Responses View -->
        <div id="view-individual" class="view-content hidden space-y-6">
            <div class="bg-white rounded-lg border border-[#fce9c1] p-4 md:p-6">
                <h3 class="font-['Plus_Jakarta_Sans'] font-bold text-[#1e1e1e] text-lg mb-4">
                    Individual Responses
                </h3>
                <div id="individual-list" class="space-y-4">
                    <!-- Responses injected here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const FORM_ID = '{{ form_id }}';
        const QUESTIONS_DEF = {{ questions | tojsonfilter | safe }};
        
        let allResponses = [];

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            fetchResponses();
        });

        async function fetchResponses() {
            try {
                const res = await fetch(`/api/responses/${FORM_ID}`);
                if (!res.ok) throw new Error('Failed to fetch data');
                const data = await res.json();
                
                allResponses = data.responses || [];
                
                updateStats(data.total_responses, allResponses);
                renderSummary(QUESTIONS_DEF, allResponses);
                renderIndividualList(QUESTIONS_DEF, allResponses);
                
            } catch (err) {
                console.error(err);
                document.getElementById('questions-summary').innerHTML = 
                    '<div class="text-center text-red-500 py-8">Failed to load responses. Please refresh.</div>';
            }
        }

        // --- 1. Stats Calculation ---
        function updateStats(totalCount, responses) {
            const completedCount = responses.filter(r => !r.partial).length;
            const completionRate = totalCount > 0 ? Math.round((completedCount / totalCount) * 100) : 0;
            
            // Calculate messages (chat_length is in metadata usually, or count keys in responses)
            let msgCount = 0;
            let totalDurationMs = 0;
            let durationCount = 0;

            responses.forEach(r => {
                // If metadata exists
                if (r.metadata) {
                    // Chat length might not be reliably tracked, let's count answers
                    const ansCount = Object.keys(r.responses || {}).length;
                    msgCount += ansCount * 2; // Approx user + bot turns

                    // Duration
                    if (r.created_at && r.metadata.last_updated) {
                       // Parse times if available
                    }
                }
            });
            
            // Render
            document.getElementById('total-responses').innerText = totalCount;
            document.getElementById('completion-rate').innerText = completionRate + '%';
            document.getElementById('total-messages').innerText = msgCount > 0 ? msgCount : '-';
            document.getElementById('avg-time').innerText = '-'; // Placeholder for now
        }

        // --- 2. Summary Rendering (Charts) ---
        function renderSummary(questions, responses) {
            const container = document.getElementById('questions-summary');
            container.innerHTML = ''; // Clear loading

            if (responses.length === 0) {
                container.innerHTML = '<div class="text-center py-12 text-gray-500">No responses yet. Share your form to get started!</div>';
                return;
            }

            questions.forEach((q, idx) => {
                // Determine type and text safely
                const qType = q.questionType || q.type || 'text';
                const qText = q.questionText || q.text || `Question ${idx + 1}`;
                const qKey = q.questionKey || String(idx); // Key to look up in response dict

                // Container for this question
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl border border-[#fce9c1] p-6 shadow-sm";
                
                // Header
                let html = `
                    <div class="mb-4">
                        <span class="bg-[#fff5e0] text-[#cc5500] px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider">
                            ${qType}
                        </span>
                        <h3 class="mt-2 text-lg font-bold text-[#1e1e1e] font-['Plus_Jakarta_Sans']">
                            ${idx + 1}. ${qText}
                        </h3>
                    </div>
                `;

                // Visualization Body
                html += `<div class="relative w-full" style="min-height: 250px;">`;
                
                if (['mcq', 'boolean', 'rating', 'yes_no', 'multiple_choice'].includes(qType)) {
                    html += `<canvas id="chart-${idx}" class="w-full h-full max-h-[300px]"></canvas>`;
                } else {
                    // Text / Open ended
                    html += `<div id="wordcloud-${idx}" class="w-full h-full flex flex-wrap gap-2 items-center justify-center p-4 bg-[#fcfcfc] rounded-lg border border-dashed border-gray-200">
                        <span class="text-gray-400 text-sm">Loading text analysis...</span>
                    </div>`;
                }
                
                html += `</div>`;
                card.innerHTML = html;
                container.appendChild(card);

                // Hydrate Chart or Word Cloud
                if (['mcq', 'boolean', 'rating', 'yes_no', 'multiple_choice'].includes(qType)) {
                    renderChart(idx, qType, q, responses, qKey);
                } else {
                    renderWordCloud(idx, qKey);
                }
            });
        }

        function renderChart(idx, type, questionDef, responses, qKey) {
            const ctx = document.getElementById(`chart-${idx}`).getContext('2d');
            
            // Tally answers
            const counts = {};
            responses.forEach(r => {
                // Handle different response structures
                const answerBlock = r.responses[qKey] || r.responses[String(idx)];
                if (answerBlock) {
                    let val = answerBlock.value;
                    if (val === true) val = "Yes";
                    if (val === false) val = "No";
                    if (val !== undefined && val !== null) {
                        counts[val] = (counts[val] || 0) + 1;
                    }
                }
            });

            const labels = Object.keys(counts);
            const data = Object.values(counts);

            if (labels.length === 0) return;

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Responses',
                        data: data,
                        backgroundColor: '#cc5500',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true, ticks: { precision: 0 } }
                    }
                }
            });
        }

        async function renderWordCloud(idx, qKey) {
            // Fetch word cloud data
            try {
                const res = await fetch(`/api/wordcloud/${FORM_ID}/${idx}`); // Uses index for backend compat if needed, or update backend to use key
                const data = await res.json();
                
                const container = document.getElementById(`wordcloud-${idx}`);
                container.innerHTML = '';

                if (data.success && data.word_frequency.length > 0) {
                    data.word_frequency.slice(0, 20).forEach(item => {
                        const span = document.createElement('span');
                        span.textContent = item.word;
                        // Simple sizing logic
                        const size = Math.min(2.5, Math.max(0.8, item.count * 0.2)) + 'rem';
                        span.style.fontSize = size;
                        span.style.color = '#cc5500';
                        span.style.opacity = Math.min(1, 0.4 + (item.count * 0.1));
                        span.className = "font-bold m-1";
                        container.appendChild(span);
                    });
                } else {
                    container.innerHTML = '<span class="text-gray-400 text-sm">No significant words found.</span>';
                }
            } catch(e) {
                console.error(e);
            }
        }

        // --- 3. Individual List ---
        function renderIndividualList(questions, responses) {
            const list = document.getElementById('individual-list');
            list.innerHTML = '';

            responses.forEach((r, i) => {
                const item = document.createElement('div');
                item.className = "border border-gray-200 rounded-lg p-4 hover:bg-gray-50 transition-colors";
                
                const dateStr = r.created_at ? new Date(r.created_at).toLocaleString() : 'Unknown Date';
                const statusBadge = r.partial 
                    ? '<span class="px-2 py-0.5 rounded text-xs bg-yellow-100 text-yellow-800">Partial</span>' 
                    : '<span class="px-2 py-0.5 rounded text-xs bg-green-100 text-green-800">Complete</span>';

                let answerHtml = '<div class="mt-3 space-y-2 text-sm">';
                questions.forEach((q, qIdx) => {
                    const qKey = q.questionKey || String(qIdx);
                    const qText = q.questionText || q.text;
                    const ans = r.responses[qKey] || r.responses[String(qIdx)];
                    
                    if (ans && ans.value) {
                        answerHtml += `
                            <div>
                                <span class="font-bold text-gray-700">${qText}:</span>
                                <span class="text-gray-600 ml-1">${ans.value}</span>
                            </div>
                        `;
                    }
                });
                answerHtml += '</div>';

                item.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="font-bold text-[#1e1e1e]">Respondent #${i+1}</span>
                            <div class="text-xs text-gray-500 mt-1">${dateStr}</div>
                        </div>
                        ${statusBadge}
                    </div>
                    ${answerHtml}
                `;
                list.appendChild(item);
            });
        }

        // --- Utils ---
        function switchTab(tabName) {
            // Toggle buttons
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('bg-gradient-to-r', 'from-[#cc5500]', 'to-[#d12b2e]', 'text-white');
                b.classList.add('bg-transparent', 'text-[#cc5500]');
            });
            const activeBtn = document.getElementById('tab-' + tabName);
            activeBtn.classList.remove('bg-transparent', 'text-[#cc5500]');
            activeBtn.classList.add('bg-gradient-to-r', 'from-[#cc5500]', 'to-[#d12b2e]', 'text-white');

            // Toggle Content
            document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + tabName).classList.remove('hidden');
        }

        async function exportData(format) {
            window.location.href = `/api/export/${FORM_ID}/${format}`;
        }
    </script>
</body>
</html>

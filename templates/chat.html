<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#cc5500">
    <title>{{ form_title }} - Barmuda Forms</title>
    <!-- Clean code deployed: v3.0 -->
    
    <!-- Google Analytics (GA4) for anonymous survey tracking -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7C7SPTNMLT"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-7C7SPTNMLT', {
            // Anonymous tracking for surveys
            anonymize_ip: true,
            client_storage: 'none'  // No cookies for respondents
        });
        
        // Track survey start
        gtag('event', 'survey_started', {
            form_id: '{{ form_id }}',
            form_title: '{{ form_title }}'
        });
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        .chat-container {
            overflow-y: auto;
            scroll-behavior: smooth;
        }
        
        .message-enter {
            opacity: 0;
            transform: translateY(10px);
        }
        
        .message-enter-active {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 300ms, transform 300ms;
        }
        
        /* Bouncing typing ellipsis */
        .typing-ellipsis {
            display: inline-flex;
            gap: 2px;
            align-items: center;
            justify-content: center;
            height: 20px;
        }
        
        .typing-ellipsis .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #666;
            animation: bounce 1.4s infinite ease-in-out;
        }
        
        .typing-ellipsis .dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-ellipsis .dot:nth-child(2) { animation-delay: -0.16s; }
        .typing-ellipsis .dot:nth-child(3) { animation-delay: 0s; }
        
        @keyframes bounce {
            0%, 80%, 100% { 
                transform: scale(0.8);
                opacity: 0.5;
            }
            40% { 
                transform: scale(1.2);
                opacity: 1;
            }
        }
        
        /* Completion screen overlay */
        .completion-overlay {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="bg-[#fef5e0] h-screen overflow-hidden flex flex-col">
    {% set nav_type = 'chat' %}
    {% include 'partials/nav.html' %}

    <!-- Main Chat Area -->
    <div class="flex-1 flex flex-col px-3 md:px-4 pt-24 md:pt-28 pb-3 md:pb-4 space-y-2 md:space-y-3 min-h-0">
        <!-- Form Title -->
        <div class="text-center flex-shrink-0">
            <h1 class="font-['Plus_Jakarta_Sans'] font-bold text-[#cc5500] text-lg md:text-xl lg:text-2xl tracking-[-0.24px]">
                {{ form_title }}
            </h1>
        </div>

        <!-- Progress Bar -->
        <div class="mx-auto w-full max-w-2xl flex-shrink-0 mb-2">
            <div class="bg-[#ffddc5] h-2 md:h-2.5 rounded-full border border-[#fdefd1]">
                <div id="progress-bar" class="bg-[#cc5500] h-2 md:h-2.5 rounded-full border border-[#fdefd1] transition-all duration-500 ease-out" style="width: 0%"></div>
            </div>
        </div>

        <!-- Chat Container -->
        <div class="mx-auto w-full max-w-2xl bg-white rounded-2xl md:rounded-3xl border border-[#fce9c1] flex-1 flex flex-col min-h-0 shadow-sm">
            <!-- Chat Messages -->
            <div id="chat-messages" class="chat-container px-3 md:px-4 py-3 md:py-4 space-y-3 flex-1 min-h-0">
                <!-- Messages will be dynamically added here -->
            </div>
        </div>

        <!-- Message Input -->
        <div class="mx-auto w-full max-w-2xl bg-white rounded-full shadow-lg border border-[#fce9c1] flex-shrink-0">
            <div class="flex items-center gap-2 px-3 py-2">
                <div class="flex-1 px-3 py-2">
                    <input 
                        type="text" 
                        id="message-input" 
                        placeholder="Type your message..."
                        class="w-full font-['DM_Sans'] text-sm md:text-base text-[#1e1e1e] tracking-[-0.16px] bg-transparent border-none outline-none placeholder:text-[#959494]"
                        disabled
                    >
                </div>
                <button 
                    id="send-button" 
                    class="bg-gradient-to-r from-[#cc5500] to-[#d12b2e] w-8 h-8 md:w-9 md:h-9 rounded-full flex items-center justify-center border border-[#cc5500] disabled:opacity-50 hover:shadow-md transition-shadow"
                    disabled
                >
                    <i class="ph ph-paper-plane-right text-white text-2xl"></i>
                </button>
            </div>
        </div>

    </div>

    <!-- Chat Completion Overlay -->
    <div id="completion-overlay" class="hidden fixed inset-0 completion-overlay flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl border border-[#fce9c1] p-6 md:p-8 mx-4 max-w-md w-full text-center shadow-xl">
            <!-- Success Icon -->
            <div class="mb-4">
                <div class="w-16 h-16 bg-gradient-to-r from-[#cc5500] to-[#d12b2e] rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="ph ph-check text-white text-2xl"></i>
                </div>
            </div>
            
            <!-- Completion Message -->
            <div class="mb-6">
                <h2 class="font-['Plus_Jakarta_Sans'] font-bold text-[#1e1e1e] text-xl md:text-2xl tracking-[-0.2px] mb-3">
                    Thanks for the chat! 😊
                </h2>
                <p class="font-['DM_Sans'] text-[#6b7280] text-base leading-relaxed">
                    Your responses have been shared and will help make a real difference.
                </p>
            </div>
            
            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <a href="/" class="bg-gradient-to-r from-[#cc5500] to-[#d12b2e] rounded-full px-6 py-3 text-white font-['DM_Sans'] font-medium text-sm hover:opacity-90 transition-all duration-200 inline-flex items-center justify-center gap-2 shadow-md hover:shadow-lg">
                    <i class="ph ph-plus text-white text-base"></i>
                    <span>Create Your Own</span>
                </a>
                <button onclick="closeChat()" class="bg-white border-2 border-[#fce9c1] rounded-full px-6 py-3 text-[#cc5500] font-['DM_Sans'] font-medium text-sm hover:bg-[#fef5e0] transition-all duration-200 inline-flex items-center justify-center gap-2">
                    <i class="ph ph-x text-[#cc5500] text-base"></i>
                    <span>Close</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let sessionId = null;
        let deviceId = null;
        let formId = '{{ form_id }}';
        let messageCount = 0;
        let isEnded = false;

        // Initialize session
        async function initializeChat() {
            try {
                // Show typing indicator immediately when page loads
                showTypingIndicator();
                
                // Restore session ID if exists
                const storedSession = localStorage.getItem(`barmuda_session_id_${formId}`);
                if (storedSession) {
                    sessionId = storedSession;
                    console.log('Restored session ID from localStorage:', sessionId);
                }

                const payload = {
                    form_id: formId,
                    location: {}
                };

                if (sessionId) {
                    payload.session_id = sessionId;
                }

                // Start chat session
                const response = await fetch('/api/chat/start', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    if (sessionId) {
                        console.warn('Session resumption failed, clearing localStorage.');
                        localStorage.removeItem(`barmuda_session_id_${formId}`);
                        sessionId = null;
                        
                        // Retry without session ID
                        const retryResponse = await fetch('/api/chat/start', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ form_id: formId, location: {} })
                        });
                        
                        if (retryResponse.ok) {
                            const retryData = await retryResponse.json();
                            return handleStartSuccess(retryData);
                        }
                    }
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                handleStartSuccess(data);

            } catch (error) {
                console.error('Error initializing chat:', error);
                hideTypingIndicator();
                addMessage('system', 'Sorry, there was an error starting the chat. Please refresh the page.');
            }
        }
        
        function handleStartSuccess(data) {
            if (data.success) {
                sessionId = data.session_id; 
                localStorage.setItem(`barmuda_session_id_${formId}`, sessionId);
                
                hideTypingIndicator();
                
                const filterSystemMessages = (msg) => {
                    if (typeof msg.content !== 'string') return true;
                    return msg.content !== 'START_SURVEY_SESSION' && msg.content !== '[ABANDONED]';
                };

                if (data.ended) {
                    isEnded = true;
                    const messagesContainer = document.getElementById('chat-messages');
                    messagesContainer.innerHTML = '';

                    if (data.chat_history) {
                        data.chat_history
                            .filter(filterSystemMessages)
                            .forEach(msg => {
                                const timestamp = msg.timestamp ? new Date(msg.timestamp) : null;
                                addMessage(msg.role, msg.content, timestamp);
                            });
                    }
                    if (data.greeting) addMessage('assistant', data.greeting);
                    setTimeout(() => showCompletionScreen(), 500);
                } else if (data.resumed) {
                    const messagesContainer = document.getElementById('chat-messages');
                    messagesContainer.innerHTML = '';

                    if (data.chat_history) {
                        data.chat_history
                            .filter(filterSystemMessages)
                            .forEach(msg => {
                                const timestamp = msg.timestamp ? new Date(msg.timestamp) : null;
                                addMessage(msg.role, msg.content, timestamp);
                            });
                    }
                    
                    updateProgress();
                    if (data.greeting) addMessage('assistant', data.greeting);
                    if (data.chip_options && data.chip_options.show_chips) addChipOptions(data.chip_options);
                    
                    document.getElementById('message-input').disabled = false;
                    document.getElementById('send-button').disabled = false;
                    document.getElementById('message-input').focus();
                } else {
                    addMessage('assistant', data.greeting);
                    if (data.chip_options && data.chip_options.show_chips) {
                        addChipOptions(data.chip_options);
                    } else {
                        checkForChipOptions(data.greeting);
                    }
                    document.getElementById('message-input').disabled = false;
                    document.getElementById('send-button').disabled = false;
                    document.getElementById('message-input').focus();
                }
            } else {
                hideTypingIndicator();
                addMessage('system', data.error || 'Failed to start chat');
            }
        }

        function addMessage(sender, message, timestamp = null) {
            const messagesContainer = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message-enter';
            
            const now = timestamp || new Date();
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            let displayText = message;
            if (typeof message === 'object' && message !== null) {
                if (Array.isArray(message)) {
                    displayText = message.map(block => {
                            if (typeof block === 'string') return block;
                            if (block.type === 'text') return block.text;
                            return '';
                        }).join(' ');
                } else if (message.type === 'text') {
                    displayText = message.text;
                } else if (message.content) {
                     displayText = message.content;
                }
            }
            
            if (typeof displayText !== 'string') displayText = String(displayText || '');

            if (sender === 'user') {
                messageDiv.innerHTML = `
                    <div class="flex justify-end">
                        <div class="bg-[#cc5500] max-w-[280px] md:max-w-[320px] px-3 md:px-4 py-2.5 md:py-3 rounded-2xl rounded-tr-md shadow-sm">
                            <div class="font-['DM_Sans'] text-white text-sm md:text-base leading-relaxed mb-1 message-text">${displayText}</div>
                            <div class="font-['DM_Sans'] text-white/70 text-xs">${timeStr}</div>
                        </div>
                    </div>
                `;
            } else if (sender === 'assistant') {
                messageDiv.innerHTML = `
                    <div class="flex justify-start">
                        <div class="bg-white max-w-[280px] md:max-w-[320px] px-3 md:px-4 py-2.5 md:py-3 rounded-2xl rounded-tl-md border border-[#e5e7eb] shadow-sm">
                            <div class="font-['DM_Sans'] text-[#1e1e1e] text-sm md:text-base leading-relaxed mb-1 message-text">${displayText}</div>
                            <div class="font-['DM_Sans'] text-[#6b7280] text-xs">${timeStr}</div>
                        </div>
                    </div>
                `;
            } else {
                messageDiv.innerHTML = `
                    <div class="flex justify-center">
                        <div class="bg-red-50 text-red-600 px-3 py-2 rounded-xl text-xs md:text-sm border border-red-200">${displayText}</div>
                    </div>
                `;
            }
            
            messagesContainer.appendChild(messageDiv);
            setTimeout(() => {
                messageDiv.classList.remove('message-enter');
                messageDiv.classList.add('message-enter-active');
            }, 10);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            return messageDiv;
        }

        async function sendMessage() {
            if (isEnded) return;
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            if (!message || !sessionId) return;
            
            addMessage('user', message);
            input.value = '';
            input.disabled = true;
            document.getElementById('send-button').disabled = true;
            
            const chipContainers = document.querySelectorAll('.chip-container');
            chipContainers.forEach(container => container.remove());

            try {
                const responseDiv = addMessage('assistant', '');
                const responseTextContainer = responseDiv.querySelector('.message-text');
                
                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, message: message })
                });

                if (!response.ok) throw new Error('Stream failed');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let accumulatedText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.type === 'token') {
                                    accumulatedText += data.text;
                                    responseTextContainer.textContent = accumulatedText;
                                    document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
                                } else if (data.type === 'meta') {
                                    if (data.chip_options && data.chip_options.show_chips) addChipOptions(data.chip_options);
                                    handleCompleteResponse(data);
                                }
                            } catch (e) {}
                        }
                    }
                }
            } catch (error) {
                console.error('Chat error:', error);
                addMessage('assistant', 'Sorry, I encountered an error.');
            } finally {
                input.disabled = false;
                document.getElementById('send-button').disabled = false;
                input.focus();
            }
        }
        
        function handleCompleteResponse(data) {
            updateProgress();
            if (data.ended) {
                isEnded = true;
                document.getElementById('message-input').disabled = true;
                document.getElementById('send-button').disabled = true;
                setTimeout(() => showCompletionScreen(), 1500);
            }
        }

        async function checkForChipOptions(message) {
            if (!sessionId || !message) return;
            try {
                const response = await fetch('/api/chat/check_chips', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, message: message })
                });
                const data = await response.json();
                if (data.success && data.chip_options && data.chip_options.show_chips) addChipOptions(data.chip_options);
            } catch (e) {}
        }

        function showTypingIndicator() {
            hideTypingIndicator();
            const messagesContainer = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message-enter typing-message';
            messageDiv.innerHTML = `
                <div class="flex justify-start">
                    <div class="bg-white max-w-[280px] md:max-w-[320px] px-3 md:px-4 py-3 rounded-2xl rounded-tl-md border border-[#e5e7eb] shadow-sm">
                        <div class="typing-ellipsis"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    </div>
                </div>
            `;
            messagesContainer.appendChild(messageDiv);
            setTimeout(() => {
                messageDiv.classList.remove('message-enter');
                messageDiv.classList.add('message-enter-active');
            }, 10);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addChipOptions(chipData) {
            const messagesContainer = document.getElementById('chat-messages');
            const existingChips = messagesContainer.querySelectorAll('.chip-container');
            existingChips.forEach(chip => chip.remove());
            if (!chipData.options || chipData.options.length === 0) return;
            
            const chipContainer = document.createElement('div');
            chipContainer.className = 'chip-container flex flex-wrap gap-2 px-3 md:px-4 pb-3 justify-start';
            const chipsWrapper = document.createElement('div');
            chipsWrapper.className = 'flex flex-wrap gap-2 max-w-[280px] md:max-w-[320px]';
            
            chipData.options.forEach(option => {
                const chip = document.createElement('button');
                chip.className = 'chip-option bg-gray-50 border border-gray-200 text-gray-700 px-3 py-1.5 rounded-lg text-sm hover:bg-gray-100 transition-all focus:outline-none shadow-sm';
                let displayLabel, clickValue;
                if (typeof option === 'object' && option !== null) {
                    displayLabel = option.label || option.value;
                    clickValue = option.value || option.label;
                } else {
                    displayLabel = option;
                    clickValue = option;
                }
                chip.textContent = displayLabel;
                chip.onclick = (e) => { e.preventDefault(); handleChipClick(clickValue); };
                chipsWrapper.appendChild(chip);
            });
            chipContainer.appendChild(chipsWrapper);
            messagesContainer.appendChild(chipContainer);
            chipContainer.style.opacity = '0';
            chipContainer.style.transform = 'translateY(10px)';
            setTimeout(() => {
                chipContainer.style.transition = 'opacity 300ms, transform 300ms';
                chipContainer.style.opacity = '1';
                chipContainer.style.transform = 'translateY(0)';
            }, 100);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function handleChipClick(chipValue) {
            const chipContainers = document.querySelectorAll('.chip-container');
            chipContainers.forEach(container => {
                container.style.opacity = '0';
                setTimeout(() => container.remove(), 200);
            });
            document.getElementById('message-input').value = chipValue;
            setTimeout(() => sendMessage(), 250);
        }

        function hideTypingIndicator() {
            const typingMessages = document.querySelectorAll('.typing-message');
            typingMessages.forEach(msg => msg.remove());
        }

        async function updateProgress() {
            if (!sessionId) return;
            try {
                const response = await fetch(`/api/chat/status/${sessionId}`);
                const data = await response.json();
                if (data.progress) {
                    document.getElementById('progress-bar').style.width = `${data.progress.percentage}%`;
                }
            } catch (error) {}
        }

        function showCompletionScreen() {
            document.getElementById('completion-overlay').classList.remove('hidden');
            if (typeof gtag !== 'undefined') {
                gtag('event', 'survey_completed', { form_id: formId });
            }
        }

        function closeChat() {
            if (window.history.length > 1) window.history.back(); else window.close();
        }

        document.getElementById('send-button').addEventListener('click', sendMessage);
        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });
        window.addEventListener('load', initializeChat);
    </script>
</body>
</html>
